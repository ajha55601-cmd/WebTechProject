<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexMart | Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <form id="registrationForm" novalidate>
            <h2>Create Account</h2>
            <p class="subtitle">Join our community today</p>

            <div id="successMessage" class="success-box hidden">
                Registration successful! Welcome aboard.
            </div>

            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your name">
                <small class="error-text" id="nameError"></small>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@mail.com">
                <small class="error-text" id="emailError"></small>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="e.g. 1234567890">
                <small class="error-text" id="phoneError"></small>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters">
                <small class="error-text" id="passwordError"></small>
            </div>

            <button type="submit" id="submitBtn">Register Now</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
