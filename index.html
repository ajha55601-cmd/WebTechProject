        body {

        }

        h1 {
            margin-top: 30px;
        }

        /* Glass Box */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Assignment Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 80%;
            margin: 40px auto;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .box:hover {
            background: gold;
            transform: scale(1.1);
        }
    </style>

</head>
