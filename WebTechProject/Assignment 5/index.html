<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme"> <div class="calculator-container">
        <div class="calc-header">
            <span>SCIENTIFIC</span>
            <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
        </div>

        <div class="display">
            <div id="history-display" class="history-screen"></div>
            <div id="main-display" class="main-screen">0</div>
        </div>

        <div class="buttons-grid">
            <button class="btn scientific" onclick="appendFunc('sin')">sin</button>
            <button class="btn scientific" onclick="appendFunc('cos')">cos</button>
            <button class="btn scientific" onclick="appendFunc('sqrt')">√</button>
            <button class="btn scientific" onclick="appendFunc('sqr')">x²</button>
            
            <button class="btn control" onclick="clearDisplay()">AC</button>
            <button class="btn control" onclick="backspace()">⌫</button>
            <button class="btn operator" onclick="appendValue('/')">÷</button>
            <button class="btn operator" onclick="appendValue('*')">×</button>

            <button class="btn" onclick="appendValue('7')">7</button>
            <button class="btn" onclick="appendValue('8')">8</button>
            <button class="btn" onclick="appendValue('9')">9</button>
            <button class="btn operator" onclick="appendValue('-')">-</button>

            <button class="btn" onclick="appendValue('4')">4</button>
            <button class="btn" onclick="appendValue('5')">5</button>
            <button class="btn" onclick="appendValue('6')">6</button>
            <button class="btn operator" onclick="appendValue('+')">+</button>

            <button class="btn" onclick="appendValue('1')">1</button>
            <button class="btn" onclick="appendValue('2')">2</button>
            <button class="btn" onclick="appendValue('3')">3</button>
            <button id="equals" class="btn equals" onclick="calculate()">=</button>

            <button class="btn zero" onclick="appendValue('0')">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>
        </div>

        <div class="history-panel">
            <h3>History</h3>
            <ul id="history-list">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
